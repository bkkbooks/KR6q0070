出家求頌標心脫帽法丹霞借力堂前剗草些塞上不須嗟失馬盃中端欲斷疑蛇久懷甘露濯塵骨將意叢林開覺華古渡雪蘆明月共一壺秋色屬吾家牧童水牯老行步穩蓑郎癡歌笑繁物外初無塵滓胸中別有丘園遊司真洞桃華濯錦春水寒洞門窈窕玉勾欄三峯擁翠雲吞屋九井揚波雪濺壇象帝先身元老語谷神後事阿誰觀羽郎清瘦髮半白待乞安期五色丸仲春過龍舒法華山尋誦經道者舊庵支徑入窮谷來尋道者庵梵音今默默華雨尚毿𣯶夜白月半屋寒青燈一龕夢隨歌吹去借路過江南月禪人出丐求頌踏雪到人家投機的不差月魂通水脈春信入梅華去覓炊香許來寬束篾些上方分佛事先我過毘耶淵禪人出丐求頌淵源徹底碧涵秋誰道寒光凝不流轉眄蘆華與明月更無一物礙船頭去來得妙縱橫自由巨鼇犯餌快須掣便是仙山墜也休即覺庵子中居士來訪妙峯之西既去作六言五首送之越境能來訪我扶笻頗肖游僧得與坐間語味諒其胸底懷氷夢曉寒松挂月心秋古井含津至道百家合轍同風千里成隣欲下前時雪磴重開向日風翎此去丁寧華鳥莫來狼藉春庭歸來三徑春草夢臥一圍雨蓑白髮暗移玉燭昏窓淨洗金波世外道人有在庵中瓶粟無儲過客未容空去挽衣相與分送月上人歸鄉西風木落山露骨秋月在水波濯魂客意歸臥四明麓三世佛從禪口吞大千俱壞我不壞三六相昏渠不昏劫空照見造化種回首應物亡塵根夏安居日過實上人東軒時新竹浴雨因作句歌之籜龍出叢林脫錦露新綠昂藏引頭角密密均節目娟然塵外姿雲霧膩寒玉翠滿東窓陰心眼掃惡俗虛靜頗道情清癯見風骨惠我不老春為誰無絃曲葛陂蟄時事第恐雷雨促不能留高間雙碧淡相矚再和朱朝奉見寄朅來林下人挂冠脫朝綠身間道愈尊神靜碧照目落落我就璞碌碌誰如玉欲學陶淵明高情異浮俗白雲無定心青山有奇骨肯從蓮社賓共奏無絃曲佛生等一念日劫詎延促傾蓋同故人道存聊一矚擬石牛與悟上人阿牛純熱不鞭牽臥向古源蒼樹邊春谷玉田看去種雪山香草飽來眠背頭隆骨任豐載鼻底流津大作川異路行行哮吼處莫忘露地未萌前雨夜宿龍門曉登靈光臺禮佛眼塔一躍龍門適舊懷棱棱浪級向人開洗塵雲陣澆華雨借力天衢破蟄雷略彴駕溪桃水滿浮屠瘞骨玉山頹欲知佛眼無遮障須到靈光不夜臺過虎頭巖空巖儼若虎頭蒼雲膩巖前草木光竹吐錦萌春雨飽松含黃粉野吹香石床蟠足散征倦道境洗心聊坐忘投飯上方蘭若去未能癡學顧長康塵上人出丐求頌輕輕彈指便開門百億門前百億身妙應因緣通處處圓明箇事遍塵塵華間峯採黃鬚蜜柳上鶯傳青眼春歸日相呼滿鉢飯一時分付飽參人別鄒秀才聲利明來若夢游肯迃征家宿雲棲情高素抱山樊志性淡幽尋松石儔愛我家風清入眼問伊時事點搖頭今朝送別還孤坐空對爐煙篆字浮游雲棲院作偈與住山琛老禪紫宵峯頂金浮屠風鈴揚音鬧蒼虛玉欄中地穩行道雲磴下林新葺廬江山懷抱富不惡霜月軒窓清有餘老眼寒青伴耶舍炷香心醉竺仙書與觀禪者豁淨虛通入覺場體前一段本來光孤禪恰恰如擔板默照明明似面牆秋光蘆華兩岸雪夜寒桂月一船霜迢迢象外行歸路雁字低低正夕陽禪人發心丐席求頌萬指相從作正觀出求臥席著蒲團恬處斂雨野雲薄湛若磨風秋水寒卷去猶知鼻頭痛坐來方信髑髏乾蘆花明月阿誰事人在江湖把釣竿吉祥長者草茸茸香軟登機棱路通卷去若人呈已事得來與我展家風默游兩岸雪蘆外瘦坐五湖煙水中未許春眠夢蝴蝶大方引步劫壺空送從上人馳書至京西衲帔蒙頭自照人月明堂上轉機輪肯傳千里鶺鴒語要作十分棠棣春雪嶺同風當日事石頭束篾舊時麟家林歸臥長連穩滿眼清光不見身蔣新臣秀才告別作句送之雪屋高寒能我過疎梅清秀雪林柯不屈慳宋楚人語來試宗雷蓮社科後會說盟如有以此行洗念入無何春風遲立欄竿曲白雪樓前船弄梭津禪人出化盞橐乞頌喫茶去語落諸方聚首商量柄杷長相席是渠能打令同塵輸爾解和光舌頭狤獠明無骨鼻孔纍垂暗有香盞橐成來圓此話儂家受用恰平常宣和甲辰三月三日山谷寺偶成是時欲下長蘆也溫風在山谷青紫班芳妍浩然春公心不作彼此偏其來初無像榮事亦自然雲容淡如鶴草色齊膩煙竹萌裹豹袴蕨茁引兒拳盤箸富可喜齒頰甘亦便山水濯塵念風雲會前緣葦江懷道人擁眾幾兩千頂門眼照世胸中海吞川同雛丹山巢羽成各翔遷而今欲住集相見而忘年執鞭驅竝駕未愧無綵韉白鷗行作伍水對烹煎撫摩青石牛不得陪高眠將趨皖口市就買莎郎船回首謝諸祖覺法吾所天慧燈耿不夜心花芳枝聯後日兒孫輩莫怪森羅前欲渡長蘆與琛上人漁家詞岸樹藤繩欲解維海門蒲席弄清吹舟不澁興無涯回首𤅬山煙翠姿一葦江頭老白眉而今問訊慰相思風靜夜月明時滿眼寒光下釣絲游龜山和何學士一宿曹溪今迺時永嘉想見未忘茲如何淮風遏行色不得扶杖相參隨斯須佳惠玩珠璧璨然傾瀉胸中奇詞鋒明銳許誰敵禪悅清酣還我追約君入社背時事種藕著華春滿池道在金蘭端未艾回頭閱世真兒嬉送慧禪人往上江糴麻米石霜拈處最分明萬萬千千一粒生歸日飯香穿鼻孔相呼作舞下堂行雲門糊餅趙州茶裏許明明著得些公案見成知味底一千二百衲僧家解開蔑束肚皮寬子去誰憂甑釜寒雲水相迎船到岸飽叢林事不相瞞蘆華明月水茫茫激箭風舟破冷光親到廬陵醻米價那時開口便相當去去西江趁便風丁寧底意語龐公歸來定是通身飯直下人人識己躬浮舟下淮訪龜山禪師霜風獵獵掃平野沙頭蓁翳淨如燖淮津斜轉龜山麓雲漢微分雁塔尖籬落梅梢春點點庭除松影月纖纖禪家況是不友問訊勤來想未嫌與黃道友人頭膏火底心休來預林儔默默游犀暈成時月魄夜雁行斷處霽容秋百年分付三椽下萬象崢嶸一指頭歸去懶融無伎倆庵前華鳥莫相求浮舟之昌國謁韓克明知縣南風帆腹飽半夜渡滄津鯨海漾新月仙山尋故人浪寒千里雪烟暖十洲春來就昌黎語良慚我効顰冲禪人與翠山出丐求頌歸去家山雪未消到時雪後翠棱高豁然直下斷三際卓爾箇中抽一毫化鉢不妨游幻海虛舟何憚駕驚濤因緣成熟袖雙手莫學吾家敗酒糟利禪人發心丐開海田檀度夤緣約遠尋利他方稱出家心丐行端取叢林飽耕耨不嫌泥水深地面丕平春種玉波痕清淺月浮金栽田博飯吾家事一段風規得老琛湛禪人開田求頌衲僧茲欲起家門老牯鞭催泥水渾混處蹈翻明月影轉時耕斷白雲根力田辛苦遵吾祖炊飯馨香飽子孫底事既歸蒲坐穩湛圓心鑑夙忘痕小師智寬與國清作丐請語入鄽一鉢是生涯來自寒山拾得家曉影玉鉤蘿戶月春叢黃粉蜜房華午炊佛土香傳鼻參飽雲門飯打牙准擬神通何處借淨名居士住毘耶靈上人丐鹽求頌熬煉渠經幾度難炎炎爐鞴頭看可中皓色從來瑩直下滄溟吸得乾力展家風排淡薄妙將滋味破辛酸道人意滿期歸也雪擁茅簷不覺寒端禪人丐鹽求頌紅爐焰裏結氷霜收拾儂家妙有方舌本要資雲水味鼻端相助蕨薇香掃歸茆舍閒堆雪坐照金盤淨發光去去道人成底事芳滋許我沃枯腸與孫宣教作別江頭五載餘海邊相訪未嫌迃山林意與世幾絕丘壑姿逢秋更癯約我道耕新活計輟君詩戰老工夫兒婚女嫁誰家事居士有心從馬駒隣月堂求頌畦衣我是出塵人卜築高堂與月隣床上金刀香剪桂篋中玉斧冷修輪寒癯破夢無嫌病清白傳家不愧貧門外潮平舡著棹點頭老兔靜分身善應不觸出門雲水任茫茫相應相醻許當行一切時無第二念雪峯於此謝靈光大功不宰吾家消息默中看看處虛明霽月寒一色是功須轉却石霜端要髑髏乾寄石湫童知縣溪頭茆屋遠追陶斗米而今懶折腰漢水丈人甘抱甕箕山居士厭鳴瓢心秋霽月夜相照鬢雪溫風吹不消身世曲肱分付夢遽隨蝴蝶到華條上元後二日過謙師庵橫溪一徑兩山分深翠籠蔥竹日昏流水漱氷寒有骨閒雲斂霽雪無根應容野毳來投飯不管春眠往扣門窓几薰爐搖篆字龜床塵語對清溫應禪人開田求頌飄飄捉杖出煙蘿行丐身心遽許多針鼻細中投玉線機頭密處度金梭應緣片片雲成雨分照團團月在波底意周旋便回首舊巢寒臥雪林柯恭鑑二禪人幹浴鑊求頌大冶鎔金入範看不嫌口闊肚皮寬得來妙觸通身眼淨放光明赤肉團衲子落成俱受賜檀那相助許投干底心試問楞嚴友道契圓通只箇般範金為鑊沸蘭津分付楞嚴會上賓妙觸宣明渠具眼纖塵不受我通身投諧冷暖渾忘水迎合溫和似得春爐鞴相催成底器量吞雲夢可斯人航海之寶陀訪真歇師兄至人親見古觀音化迹今居海上岑煙機外分青嶂骨水天中見白雲心潮痕擁岸棱棱雪月魄浮波爛爛金根境一如能所斷圓通游踐法門深得得來尋真歇兄孤舟揚檝順潮行重聯斷雁雲中字遠赴閒鷗沙上盟新味清油燷紫菜古方淳蜜漬黃菁海山只箇供盤筯一段家風不世情與昌國善友駕潮舟濇岸頭沙得與巖僧欵語些夢付莊周窓外蝶疑醒樂廣酒中蛇夜堂莫怪雲慳月春嶠將知雨促華想像舊山歸去路照門新錦眼迷家化上人持鉢乞頌化事而今盡付君歸來還我驗兒孫諸塵正受盛於鉢一句含胡覆却盆別處見人知雪嶺自家喫飯識雲門底心肯負檀那力開發真機報施恩端禪人開田乞頌衲僧田地有來端底意相携出問檀春塢耕開雲錦曉月津劃破練光寒飽期束肚三條篾功就移身百尺竿恰恰相投看規矩谷聲鑑像一般般珊知浴求頌妙觸宣明不洗塵楞嚴會上悟心人潛鱗窟宅半篙水枯木形骸一杓春涓滴量同法界性髮毛垢淨虛空身南園應問聊彈指用處綿綿谷有神傳上人丐鹽求頌瀕海人居不事田生涯清白是家傳雷鳴山麓潮橫雪津出泥沙鹵泛蓮氷玉色承殺煉力蕨薇滋藉合和緣舌頭妙有圓通眼坐斷叢林五味禪崇上人求默庵頌默默中居底是庵白槌上首乃同參深明鐵磨莫顛倒真見末山非女男坐裏水天能湛湛門前華雨任𣯶𣯶一言妙證超名相不惜眉毛笑翠巖雪晴寄劉殿撰羊氈半幅一羗床寒淡家風肖老龐容易著身藏北斗等閑開口吸西江龕燈梵夾香搖几茆屋禪蒲雪照窓方外友于思對塵隱人胸次作舂撞餘姚胡氏繡觀音求頌線蹊密密度金針一一針針觀世音妙淨莊嚴成相好光明感應發身心江橫練色月浮水雨灌華枝春在林聞見可中超有路普門處處許相尋丹霞忌日明月清風霽景涼華鯨噴雪水茫茫靈然一點誰人委懷抱千年作夜光鑑維那求月堂頌桂轂誰將玉斧修風簾收卷許相留虛明窓戶不知夜清白身心長濯秋鶴夢巢寒松挂壁魚驚波動水浮鉤胡床瘦坐搖香篆淨照壺中一默游一禪人出丐求頌一霎山前春雨乾叢林氣韻洗衰寒水明玉免隨征棹線重金鱗上釣竿午鉢莫嫌分飯甑千僧無念集蒲團化機妙應頭頭准手眼通身不著謾過則上人庵歸來蘿蔦挂煙蓑釣月耕雲倦也那山上山下吞佛語溪東溪西牧牛歌廿年樹耳亡疑著一箇拳頭得用麼做盡平生閑伎倆赤鱗無奈甕虀何泉州王道友捨簟乞頌秋入眠床水一方江湖風月坐來涼浮浮爽氣仙游去身在蒼煙白鳥行真戒大師求頌炷香坐羊氈默默心住禪仙桂萌兔窟神珠媚龍淵湛照自家事出隨群動緣應機分手眼不翅有千千謝通講師五偈并引前年過我得少欵甚慰平日也別後得書并頌以忙迫乞食不暇答秋來氣清惠然見訪同丘壑般游得不作字招隱良愧後時得得客來窺大方松間目擊揖歸堂秋橫兩眼瞳人碧雲擁三衣梔子香奪席胸襟君隗礧愕隣鬚髮我滄浪竹床相對夜深語河漢濯磨星斗光五月人間膏火煎清風塵對有夤緣點頭頑石能明證借口虛空解講玄隨類佛身分百億出塵紅卷等三千未閑相約蒲禪穩作別又趨華雨筵慰心佛氏未蕭條卓卓緇林有俊髦知見香熏舌本利名言垢淨眼稜高錦雲脚踏冷修月仙嶠牽頹閒釣鼇良遂肯從麻谷後聲光矯矯壯吾曹一昨書來約見過遲留行李未成那梨黃棗赤秋如許髮白眉龐老奈何相伴採薇雲膩襪不嫌伐木雨濡蓑對床默默香搖篆霽月夜窓懸女蘿乞食因循答教遲想能心照未相疑三年約友共連璧千里同風那隔絲鞭箏嫰黃出泥土槿華寒紫裹藩籬雨驅暑去晚明霽來雁門頭字脚垂鄭通判母氏贊并引鄭禹功博士母氏食五十年於動靜四儀專念佛三昧愈老愈勤夙夜匪懈行年七十有二於八月八日鷄鳴之初安坐而逝博士書具告我以是事然人之老縻形繭臨蛻得自在無畏者斯正念之力也以無情垢之翳心惡習之兆境圓湛長存虛靈獨照夢幻之迹廓然泯矣故地水崩流火風散滅順履于如如也底事可嘉因說偈為之贊法喜為食慈悲為舍信佛是歸視身如借住正念以唯勤趣外塵而無暇機閑萬象光中眼活髑髏眉下彼亡也夢蝶露蟬自得也雲犀香麝神游真淨兮天水同秋心印妙明兮風月破夜機禪人發心丐田歷歷機梭看轉旋衲僧手眼有千千將知白雪上方飯出自黃雲負郭田溉灌流金溪口月耕犁卷幕隴頭煙和泥合水誰家事參飽元無分外禪虛禪人發心丐田虛廓襟懷作丐游機緣處處定相投開田大義聊舒手得意忘言暗點頭白牯耕回山月曉金刀剪斷野雲秋長連趺坐通身飯一飽分明百不憂早發寧海壽寧道中過奉化曉徑風香雨陣紅鑿崖棱石上梯空勸歸鳥語春過半投飯人家日正中山怪翠寒台對偶溪能柔碧剡相通楊華便是浮萍草蹤迹又隨流水東宿覆船山阻雨枝笻同到覆船巔暫寄笻枝借榻眠山水鉤簾知屬我煙霞膩枕夢遊仙覺來笋窟投筯閒把華房入線編想像玲瓏巖下雨春寒猶可臥羊氈行通善友求頌明白家風月洗霜道人寒夜坐繩床安身誰効兔三窟返照自如龜六藏疑若蛇弓蟠酒醆妙同蜂蜜得華房默游宛轉臻元極虛廓無涯步大方姚道人乞頌慈悲方便事觸處有工夫應變隨聲色團團盤走珠戚澤民從新正日供三僧求頌君家炊飯辨薇日供畦衣三阿師海上浮柸登岸後雲間飛錫過門時伊蒲塞作新香氣賓度盧迎老白眉施受等心相稱可月隨流水下春池時禪人出丐求頌老能碓下米無舂一出相煩作變通陣陣香風看稻熟番番時雨見年豐手携拍板傅大士杖挂剪刀梁誌公妙應群機真絕待秋清河淡月行空仙上人出丐求頌綴鉢持來勇入鄽家家行結勝因緣三千界重慈悲佛五百生稱忍辱仙芳濯叢林春冉冉明隨流水月娟娟飽參事與千僧供洗足蒲團枯木禪普淵行者請頌脫盡塵機真出家平持心地是生涯法堂剗草墮僧數舂屋傳衣聯祖華想變石頭山下虎悟空弓影酒中蛇寒枯只麼清修去佛種從今却較些妙慧上人求頌妙中有慧獨醒醒歷歷機前自照靈老兔夢寒眠淨魄真犀心醉得通星道游剎剎參諸佛智破塵塵出大經頑石點頭揮麈尾坐間華雨一番馨宗禪人出匃求頌萬指生涯一鉢歸叢林宗尚默無機道耕自信我寒槁妙用相煩君發揮薜荔藩籬秋蔓衍女蘿窓戶月依俙時時處處通消息物象都盧入範圍小師慧果馳書取雪峯真歇和尚鳥窠閑口聊吹布雪老低頭却入庵生死同條末後句也應千里問同參解兄之雪峯禮本師南山去見雪峯師古㵎寒泉瞪目時徹底無痕才識己轉身有路復名誰子歸父處那求顧雲向山來不待吹西舍機鳴聊織錦梭臍陰陰細飛絲與辨庵主夾山鉤上得芳鱗不作當年棒喝嗔直向劫前分手眼端能化外撥機輪是須眉底有筋漢方契寰中無舌人徹照自宗知細密任從天下樂忻忻甲寅春之海山雨後訪王淵明知縣誰問春泥沒履牙蘿門窈窕綠差斜幽芳松菊淵明徑深秀溪山摩詰家默照佛燈寒不掉對緣心鑑淨無瑕仍聞懶甚融居士庭鳥幾番狼藉華禪人發心幹鐘乞頌木落空山霜夜樓時一撞隨風度林嶺喚月到蘿窓響應虛傳谷聲飛不礙江夢回天意曉蝴蝶失雙雙保福傳化士乞頌梅福仙游井汲枯而今雲水穩禪蒲青原門下藏麟角黃蘗床頭捋虎鬚學子柏庭寒立雪檀家飯甑軟炊珠乞歸將意叢林煖松食荷衣良槁癯儞上人幹造延壽院乞頌叢林百丈有清規特設堂安老病師隱几虛心還自照炷香孤坐絕他思妙窮正念空三世淨洗餘昏月一墀底意欲從何處問毘耶居士飽相知訪黃給事承往寶陀禮普門大士留偈泛舟誰畏海門津丈室來尋彼上人塵語欲求青眼舊友心未爽白頭新黃家羊臥藩籬晚梅氏仙游島嶼春餬餅饅頭看手段觀音妙智在塵塵廓禪人幹田求頌廓虛田地絕蓁荊望斷玉壺氷鑑平素色依稀雲擁耒練光片段月分耕意為衲子延笻履力匃檀那助飯羹將見金牛笑相喚叢林氣像不多爭送修街坊出匃海上鼇峯裹綺霞梅仙朋舊有生涯清眠夢落三山月和氣吹成一縣華去駕風舟尋長者來分甑飯入吾家待君歸掃餘疑膜盃影垂弓不是蛇退天童上太守吳學士三椽五合不求餘汩汩營營笑拙疎妄立是非徒喻馬樂同彼此解觀魚洗霜骨出山宜瘦答響神藏谷應虛莫涴人間名字垢身雲心月本如如衛進可寺丞臘月二十九日招我以飯從容勝集其居之西一堂榜曰六湛意六處休復同一湛然且求語因作偈云風瀾未作見靈源六處亡功體湛存諸法性空方得座一彈指響頓開門寒梅籬落春能早野雪櫺窓夜不昏萬像森羅心印印根塵超豁妙無痕因雪示隨行禪者家家種玉滿區區誰裹煙蓑細步趣千里同風休綴綴十方一色尚拘拘夢醒光彩兩頭斷坐穩身心三際無清白傳家衲僧事其間轉處看工夫符十五郎求頌塵勞排遣廊而明靈照心空合未萌妙盡源窮成本得從來等佛與眾生圓虛裏許得真游離水犀通一點秋機應無私登鳥道妙同明月靜隨流歲開八日謁西溪真悟講師雨華几席自清馨茗盌初收篆縷青柔弄柳條風剪剪冷濡梅蘂雪星星不嫌黃卷閑遮眼有意微塵破出經思大氣吞三世佛兒孫未到敗門庭雲上人持鉢乞頌雲水千僧共默耕煩君乞食出山行蕨薇夜雨萌寒麓桃李春風織錦城空谷一呼同響應圓珠眾色合光明上方此去分香飯為我先須見淨名方上人持鉢乞頌卷衣破曉下連城意欲分炊往上方僧鉢飯歸三篾飽蜂房蜜合百華香柳絲鶯友調唇滑雲錦人家照眼光應變縱橫看伎倆隨身干木慣逢場與李居士枯禪胸底洗餘紛一點虛明湛若存剎剎塵塵成淨土華華葉葉發靈根無心頗肖雲為潤有照渾如月破昏舒卷縱橫俱在我箇人真得總持門森禪人持鉢求頌森羅萬象本同根箇事虛通有化門歷歷當機元不爽頭頭大用了無痕妙明田地傳家祖參飽叢林委子孫緣就歸來牆面坐秋空連水月黃昏立春後五日次本上人韻雪繞樓欄同楚些梅將青子柳柔柯山林臭味入新語風月膺胸遵古科夢付曲肱春困甚乞如胼胟老間何雨師雷伯情多妬收拾陶家壁上梭良禪人幹田求頌良田一片望無涯曠古相傳佛祖家四至町畦誰作伴中心樹子自開華示人鎌樣秋雲卷催牯鞭聲春日斜收拾歸來付耕事衲僧氣味較些些古上人出丐求頌化門到處大千身古鑑無塵谷有神方信相隨混不得堂堂獨露是何人江郎中求頌淨治心地廓無垠一段光明破夙昏撥轉機輪分化事百千三昧見門門雨晴偶作示禪者快雨快晴寒食近崢嶸芳事趁佳辰弄風柳絮疑成雪滿地榆錢買得春雷吐英英茶爪露暖班茁茁蕨拳伸桃華眼鬧隨蝴蝶誰似靈雲識故人來上人幹延壽院乞頌披蓁卜築古林阿百丈心於老病多照徹有無方得我緣分生滅不干他谷雲冷抱松根石山月明懸屋角蘿若子殷勤圓此話毘耶城裏問維摩道禪人發心幹田乞頌道人欲乞一囊錢為我成褫負郭田淺水駕牛披曉月深雲下耒破春煙力耕妙用吾家事坐照真機自己禪寄語檀那好相助年年長得飯僧緣以何學士韻示像侍者茂養高標松抱苓歲寒姿傲雪霜丁蕭騷風度山林韻偃蹇氣鍾丘壑形霽月霽雲胸次淡秋山秋水眼棱青磨塼誰問馬師語妙發枯龜一灼靈夢齊求頌香風華雨政紛紛春困何妨聊曲肱三世佛相傳寐語覺來無我壞兒孫觀知殿化殿堂燈油求頌廣堂清白照蒲團相續真燈未許殘寂默無聲閑口醭光明不掉寸心寒蓮開似對秋波淺夢覺渾疑曉漏乾十法界身流影事自他交徹鏡中看海上人知浴求頌溫溫氣象半篙津匏杓調和冷煖勻直得通身渾是水端知赤肉了無塵風埃面目揩磨淨丘壑形骸洗濯春妙觸宣明佛子住首楞嚴會有斯人時司理求頌淨磨心鑑絕游塵本際靈明自照神箇裏機回圓歷歷化分百億大千身行月大師求頌霽明夜永月行空破暗真光默默中一點至靈虛且應十方圓鑑照而沖床頭爐篆浮寒紫壁上龕燈對冷紅箇裏宗乘消息在蒲團紙帳舊家風齊上人發心知羅漢堂求頌修結僧緣清淨因青油白茗與烏薪龐眉五百聖尊者行脚一千吾上人雲屋芳姿開菡萏地爐煖氣臥麒麟睡魔不至蒲禪穩自照光明默默神華亭顧道友兒女俱出家求頌兒兒女女著袈裟留得閑身且在家不作丘坈看覺地當鉏薈蘙種曇華深藏北斗端能許吸盡西江始較些三界脫然亡影像淨名居士好生涯送明專使廓落無依合太虛行行何處不逢渠功回冷眼雙眉底照盡橫身曠劫初大仰默知東寺意玄沙明上雪峯書將歸束肚三條篾鈯斧相隨到處居月禪人出丐求頌一月在諸水動隨來去舟分身能恁麼到處恰相投湖海墮全璧魚龍吞曲鉤歸來端可慶俱得飽參休應禪人出丐求頌應身隨處見塵塵能順因緣不背真樹上虎頭呈伎倆毛端師子顯精神平生自許得游刃投老難傳知斵輪香氣滿城㷌鉢飯叢林一洗浩然春王觀察求頌廓虛深淨裏頭看一點至靈珠走盤默默通身明有眼塵塵分應妙無瘢江湖浩浩月隨溜華木欣欣春入端變化鯤鵬是時節便乘羊角作風摶趙學士求頌身前身後獨靈靈一切如來出此經歇盡狂心便相見水秋天淨月亭亭朱幹辨求頌磨洗紛塵百念秋湛然源底未分流其間自照因緣外水淨娟娟浮月鉤久上人出丐乞頌孤禪抖擻起僧氈挂鉢寒藤著瘦肩破夜無私看霽月開華不染出泥蓮底心眾事水雲餓何處人家粥飯緣寄語毘耶老居士相投莫怪喚春眠坐禪箴佛佛要機祖祖機要不觸事而知不對緣而照不觸事而知其知自微不對緣而照其照自妙其知自微曾無分別之思其照自妙曾無毫忽之兆曾無分別之思其知無偶而奇曾無毫忽之兆其照無取而了水清徹底兮魚行遲遲空闊莫涯兮鳥飛杳杳瑞巖山鐘銘并序四明瑞巖山林之勝處也胸虛豁而吞吐風雲足舒放而濯磨潮雪開善蘭若居其正中碧甍藻棟櫺檻綺疏爛爛相照杖䔧擁衲扣室投籌雲水之賓森二千指高平范公佺施巨鐘可受四十斛以警寤寐以齊動息俾四方水雲聞鯨音而知捿食有處也姑乞銘于予銘曰巨溟之西有古招提來遵鳥道歸陟雲梯叢林取則毳侶投捿規矩之振刀尺之齊環十二峯翠色瓏𤧚大廈眾集層樓虛空誰清淨施我高平公法窟永器鄧山薦銅虛中堅外宣明破晦迎蟾到門送烏下岱杵發有時聲揚無礙一念旋聞諸塵自在十方會同一鳴是從華蜂羶螘風虎雲龍尊賓成序捿食相容楚楚法子恢恢佛宗月低夜闌霜清曉寒金壺響斷玉漏津乾夢枕深省禪家正觀動隨其後靜得其端希微妙音無方可尋寄茲鴻韻導彼幽沈鈜鈜擊耳冷冷洗心神應在谷風傳度林隱隱徐徐反聞厥初根塵亡偶性覺含虛攬之不足縱之有餘真明了了淨智如如觸之而聲轟雷吼鯨當處滅盡當處出生化蝶影散債魚業清山海固深天地成平本際庵銘平等本際非去來今豈墮諸數妙圓一心一心妙圓自照靈然超出生滅混融正偏正偏混融可中忘功鸞騰玉鑑鶴出銀籠如是住處佛祖同得同得之宗淨名一默至游庵銘長蘆第一座臻兄老禪相從久如深造道妙姑以所得之奧柄麈調牧雲來衲子茲日語予曰禪家動靜游燕常在其中佛束比丘不可肆意獨居者屋則尖頭箇所謂庵者是也我所住處師可以名之隨問而應曰至游夫道人之至游矣履虛極守妙明飲真醇住清白斷崖放足空劫轉身一得妙存亡絕對待自然出應無方谷響水月塵塵無礙心心一如彼我相忘是非斯泯方圓大小歷歷不爽能如是也入諸世間真契游戲三昧斯可謂至游矣衲僧之所住處何必縛屋編茨孤兀世外因系以銘曰道人至游了無方所何辨從來何求止住去來迹絕言詮句滅寒水吞空垂雲作雪十分明白還須轉側直下相逢箇中誰識識也回頭煙冷山秋默默自得綿綿至游至游綿綿後地先天虛空體合萬像理圓其間游刃電掣機鈍該括十方通同一印一印通同十方混融鏡影谷響水月松風應之自然誰正誰偏明明絕慮恰恰周旋歸復舊家黃蘆放華夜船隱隱桂魄斜斜至游如是真實行履不墮人天何曾雲氷家風寥寥無可咬嚼枯槁身心清涼法藥相期底處結庵而住量外難窺主中之主如是至游如是真樂傳最上機提第一著明州天童山宏智覺禪師廣錄偈頌箴銘偈頌五位正中偏霽碧星河冷浸乾半夜木童敲月戶暗中驚破玉人眠偏中正海雲依約神山頂歸人鬢髮白垂絲羞對秦臺寒照影正中來月夜長鯤蛻甲開大背摩天振雲羽翔游鳥道類難該兼中至覿面不須相忌諱風化無傷的意玄光中有路天然異兼中到斗柄橫斜天未曉鶴夢初醒露氣寒舊巢飛出雲松倒五王子誕生星攢金殿降生時稱體宮衣覆雪肌功就轉身全合父光中潛撥玉輪移朝生雄心脫略戰文場端把煙蓑換龍章葵藿奉君知貴味肯懷歸去見嚴光未生甘分清孤守固窮衡門寥落正西風一鳴便是蒼梧鳳不意飄流鷗鷺中化生絲綸傳得出宸幃宣花春城類莫齊妙握當途無字印馬蹄終不染塵泥內生妙齡天嗣自重瞳尊貴威嚴鎮六宮規步從來不出禁閽人祇得頌芳風四賓主賓中賓平生心事結眉頭滿面風埃鬢已秋大底出門無伎術柰何今日路貧愁賓中主不戀經商利萬金晚來古路問家音分明得報尊親健爭柰難平喜懼心主中賓御樓吹角六街明金馬將軍出禁城閫外化權良有準不傷風物致昇平主中主不動金輪萬德全宸苔含月未排班當頭諱字寰中禁誰敢依俙犯聖顏四料簡奪人不奪境懶問誰持造化權門前春事正喧妍雨晴花色明如錦風暖鸎聲滑似絃奪境不奪人厭餘客路忽思家鬢髮春饒盡雪華月底路岐通著脚歸心未穩隔煙霞人境兩俱奪罷奏笙篁夜欲闌銀河光浸紫微寒星移月暗無消息客散雲樓酒椀乾人境俱不奪十分花事屬歌喉笑入芳塵爛漫游皇道太平無忌諱縱橫何處不風流借功明位蘋末風休夜正央水天虛碧共秋光月船不犯東西岸須信篙人用意良借位明功六戶虛通路不迷太陽影裡不當機縱橫妙展無私化恰恰行從鳥道歸借借不借借識盡甘辛百草頭鼻無牽纏得優游不知有去成知有始信南泉喚作牛全超不借借霜重風嚴景寂寥玉關金鎖手慵敲寒松盡夜無虛籟老鶴移棲空月巢針線貫通峩峩青山著秋瘦毛髮凋減風骨舊白雲乃子久相依清風借力扶出岫人間雨足便歸來澹泞寒明同去就箇中消息妙不傳白雲無心青山壽真身一葉落時天下秋不風流處却風流木人退步金繩斷直下無機牽鐵牛應身雙六盤中信彩贏風行草偃月彎晴欄街截巷憨皮袋彌勒何時不下生門裡出身無位真人赤肉團大千沙界著毛端明明不借他家事用處全功祇箇般身裡出門放曠還來荊棘林倒騎牛自醉吟吟誰嫌煙雨鬧簑笠祇箇虛空不掛針因覽仰山小釋迦語成唱道二首脫盡諸緣空不空杳無邊表喻難同須知月蚌腸中物體取雲犀角裡通建化何妨行鳥道迴途復妙顯家風太平游子歸來也雲鬢霜眉內轉功一念全超曠劫初玉人端坐白牛車往來歷盡傍參妙回首途中物物渠禮三祖智鑑禪師塔道無揀擇水深山嶷祖無出沒月寒天碧不萌枝上覺華春無影樹頭靈鳥宅天柱巍峩兮星河瀉清石牛哮吼兮洞雲生白禮四祖大毉禪師塔祖道已傳黃梅妙齡幻泡忽滅白淨無形真相堂堂照膏火教音默默鳴風鈴老松掛月寒方夜凍鶴巢雲夢未醒禮五祖大滿禪師塔黃梅果熟白藕花開問唯佛性種異凡胎衣傳南嶺人將去松老西山我再來兩借皮囊成底事一壺風月湛無埃禮投子青禪師塔塔藏玉骨雲抱山腰跡塵外泯道光內昭度金針之玉線續鳳絃之鸞膠壺春在而花芳枯木夜鶴鳴而月浸孤巢家風清淡兮石牛飲水兒孫秀拔兮天柱摩霄贊芙蓉師祖真鳳眼鶴形宗門偉匠量外提撕聲前敲唱據令兮長劍倚天應機兮明珠在掌太虛有月兮老兔含霜大海無風兮華鯨吹浪默照銘默默忘言昭昭現前鑒時廓爾體處靈然靈然獨照照中還妙露月星河雪松雲嶠晦而彌明隱而愈顯鶴夢煙寒水含秋遠浩劫空空相與雷同妙存默處功忘照中妙存何存惺惺破昏默照之道離微之根徹見離微金梭玉機正偏宛轉明暗因依依無能所底時回互飲善見藥檛塗毒鼓回互底時殺活在我門裡出身枝頭結果默唯至言照唯普應應不墮功言不涉聽萬象森羅放光說法彼彼證明各各問答問答證明恰恰相應照中失默便見侵凌證明問答相應恰恰默中失照渾成剩法默照理圓蓮開夢覺百川赴海千峯向岳如鵝擇乳如蜂採花默照至得輸我宗家宗家默照透頂透底舜若多身母陀羅臂始終一揆變態萬差和氏獻璞相如指瑕當機有準大用不勤寰中天子塞外將軍吾家底事中規中矩傳去諸方不要賺舉淨樂室銘色見聲求取道未正自得之淵常樂我淨其淨者常其樂者我是二相資如薪與火我樂無窮淨常無終湛存象外智照環中環中自虛非有非無密運靈機妙轉玄樞玄樞機轉本光瑞現心緣未萌言像何辨其辨者誰了了自知圓該家慧不涉思惟思惟不涉蘆花照雪一段光明廓然瑩徹瑩徹無方初不覆藏乘時則出涉化則昌涉化隨宜淨樂不移空含海印恰恰無虧無虧之功內外沖融法法絕待門門虛通虛通之門游戲之徑脫落根塵蘆灑眺聽眺聽夤緣手眼千千彼亡勤勤我常綿綿綿綿之妙未痕眹兆淨中之樂默中之照默照之家淨樂之室居安忘勞去華取實取實之銘無得而言善哉摩詰入不二門僧堂記夫靈山之笑溫少林之坐寒東西繩繩三十三傳老盧授衣盋而逃厥事顯著開闔歙張波瀾光焰肆口而說肆心而應道傳器受源深流長南嶽青原代以得人或默有所宗幽潛遠遯掃跡世外研究生死松食荷衣巢栖草座晦而不輝持養老成有慕其風師而親之鋤植舂炊采汲烹瀹溪芼原粟枯槁自甘來遠集繁乃建僧堂而統受焉齋臥之華師友同事刳情刲智擯學黜思妙盡心空宗通眼活發越于設施果其能而備也建炎之末人病亂離湘漢江淮兵火燔掠尊宿叢林蕪沒十八九毳衣瓶錫投棲于東南四明禪席素號小廬山郡東六十里天童道場山紆盤而氣幽松偃蹇而皮皴蒼壁附蘿煙晞而翠膩孤虹枕㵎埃濯而清揚予住山之四年十方來學雲趨水赴屋不能容比丘行深遽來白事曰柏庭友于露坐簷宿殆無尋赤與受單盋欲募淨信增大其堂得乎予頷之已而匠披于林斧鳴于谷一年餘礎布楹列梁橫桷攢棼橑翼張甍瓦鱗覆前後十四間二十架三過廊兩天井日屋承雨下無廧陼縱二百尺廣十六丈窓牖床榻深明嚴潔萬指食息超搖容與謀始于紹興壬子之冬工畢于甲寅之春總費紙錢萬五千有奇冬溫夏涼晝香夜燈開盋而飯洗足而坐耕牧其間警導以寂秋涵古井春人化機淵兮默成粲兮用光水盈科而流谷隨呼而響理契平等智應自然動靜威儀針砭相益撿責滲漏磨瑩瘢痕淬礪光芒錯礱圭角高標遠到追武古人丐心施力等不負負噫器劣學弊希易欲速以機械為蹊放蕩為詣耕于空言餒無所穫戰于彊辨勝無所歸見聞流習知解汩心佛祖之所呵魔外之得便其疵癘萌𮒶治不可緩也登崑崙之丘決河源之水濯肝膽之洿盪心目之翳生滅跡亡而妙存有無轍泯而過量大夜之夢破永劫之疑拔出家之志償行脚之事辦相從儔侶殆庶幾焉天童宏智禪師廣錄終

body:
  text: 明州天童山覺和尚偈頌箴銘侍者道京淨覺編次韻真歇和尚圓覺經頌一十四首大光明藏衲僧撥轉鐵牛機默耀靈通底是誰月兔影沈雲母地海禽夢臥珊瑚枝韶陽佛法嫌饒舌魯祖家風解惜眉端坐環中虛白處縱經塵劫箇難移文殊師利菩薩章曼殊大士振真風智洗無明去夙蒙眼瞖纔消華自滅靈光獨照妄還鎔木人步轉初歸位玉女機回却借功綱領提持看手段門門變態是神通普賢菩薩章儂家活計本天然剎剎塵塵見普賢犀角一星蟾影透神珠九曲蟻絲穿覺非漸次亡稜縫幻自消鎔得混圓妙應通身無向背古菱花不染𡟎妍普眼菩薩章誰從普眼道場來天帝堂前珠網開徹底光明成一段箇中清淨絕纖埃交羅理事真空觀照破根塵不夜臺恰恰相應爾時節陶家壁上起梭雷金剛藏菩薩章黃金出鑛斷前疑岸走舟安覺所欺動目是渠搖湛水聚螢無我灼須彌瞖消便見飛華盡機迅將知擊電遲識得堆堆庵內主外魔那得到藩籬彌勒菩薩章癡根愛種力鋤除一段靈明是舊基插草天人深會意拈華尊者笑開眉魚行大士須珍重布袋憨僧且伏惟處處鼻頭相撞磕唯心境界爾謾誰清淨慧菩薩章覺了前前非處難而今步步到長安色心㳷合無絲路法性圓融沒許般箇事本來元脫灑幾人到此出顢頇妄亡起滅功成也應笑風旛動剎竿威德自在菩薩章門開三觀莫遲留得路行行到始休鑑像照心無所住樓鐘出礙有來由頂中具眼如天主肘後分符似國侯應世度生游幻海月船風棹駕濤頭辯音菩薩章妙圓單複絕中邊五五機輪互換難絃管調來聲律合梭絲織出錦文觀身心一一能分應手眼千千不可謾似付鹽梅巖叟用和羹無復見醎酸淨諸業障菩薩章證悟由來把抦長重重脫處雪加霜眾生相在猶流浪壽命根除自息狂退骨龍能將雨去蛻鱗鯤復得風翔郢人斲盡蠅泥也方見元初鼻孔光普覺菩薩章藥病相攻雙去難心華開發自家禪天真歷歷非修證日用堂堂豈授傳高步丹霄知得計止啼黃葉信成權底時屑屑行泥滓可笑蝸牛自涴涎圓覺菩薩章選場隨手取標毬長短期中入社流覺後繩繩機自脫悟來密密類難收十分飽足雪山草一色渾成露地牛風掃水天塵翳盡蘆華相照月明秋賢善首菩薩章陀羅尼句覺皇宣一略聞名勝施緣端見髓心相付囑莫將耳口作流傳頓機做處天飛電大器任時海納川不是老婆情分切肯留文字破尼乾總頌木童吟處槁回春箇裏莊嚴功德林垂手斷崖知路活藏身空劫忌機沈未翻識浪無多子不挂唇皮有一音佛祖契心言迹外炷香清坐與追尋別洪山預和尚般游念未穩又別住山人雁影水中字雲心江上賓同條如是住千里亦成隣深翠一枝璽腐紅五合陳回途登鳥道華木故園春別滿首座丹山鳳窟冷相依慚愧如今羽翼齊雲外翔鳴同頡頏林間啄步暫分携玉華㘅處天容曉珠樹捿時月影低引喙醴泉期後會殆將新語濯塵泥別環首座雪立空庭疇墮賓丹山握手履芳塵石人破曉初移位玉女羞明却轉身去意江湖頻挂夢回頭棠棣一成春叢林衰色待膏沃側耳風霆起蟄鱗與楷知倉米坊能者較些些七百僧中獨作家半夜傳來衣有據機前收得鏡無瑕祖師只麼閑舂碓若子如今莫撒沙古井先秋念枯冷金繩釣出玉蝦蟇與因典座胸中行脚事分明親見芙蓉綴晚英黑馬踏霜元不迹白魚吹水了無聲投機曾弄無須鎖出手相扶折脚鐺去米去沙還未可要須偏正竝頭行與白表白密室分燈光焰焰空壺著月影沈沈誰言古殿今無佛只在其時來梵音十月朔與法上人南谷行拕策鳴林游興濃要將丘醉青瞳黃華尚媚秋餘日錦樹那禁霜後風轉岫蛇行岐屈曲斷崖虹臥水丁東誰慳劇味平生事分付飲茶談笑中一笻雙屨征具簡幽討勝友賓捿深與公半夜丘壑語慰我平生麋鹿心倒榻雅成山水夢落泉寒作絲桐音歸歟城寺禪膚粟定是流想來家林別覺知藏一從豆顆爆寒灰頭角崢嶸頂目開碧玉盤中珠宛轉瑠璃殿上月徘徊木人顧影當明去石女披雲半夜來偏正功圓須轉位入垂手類難該與諾侍者夢回茶碗手親扶雅意溈山轉道樞自喚主人醻一諾誰違尊者應三呼死生到日還能否辜負當年是有無妙得古人行履處了無些事作工夫與杲侍者道吾當年不肯道漸源中路沒商量先師靈骨今猶在無用扶鍬上法堂送通禪者之襄陽疎巢凄冷臥西柯夢覺歸思遽許多風雨江頭亂雁字家山島外懸漁蓑白楊村落龐居士青石浮圖蘊大哥倦倚蒼松坐涼夕兔推明月下星河宗知客虛明一念洗紛埃眼在髑髏眉底開玉鳳㗸華春不老金鷄喚月夢初回匣中古劍光干斗壁上寒梭蟄破雷佛祖入成化事那嫌榼𣜂鼻頭堆與初禪人洞下家風虛一著白牛耕斷青山脚而今何處不逢渠鼻孔纍垂相撞磕阿剌刺始信從來無縛脫與充維那機梭未動若為顏一點虛靈入道環明月光中窺自己白雲影外到家山金鼇轉側夜潮落玉馬嘶鳴春信還得手應心無不可脫然時事豈相關送僧歸豫章省親賓繭風枝夢不寧夜堂思對老人星一心歸去事萱草千里相求鳴鶺鴒樹樹丹楓金墮葉叢叢黃葦雪浮汀西山秀骨濯秋雨窓戶卷簾分遠青與簡禪人虛明道洗壯心秋畦服蒙顱下板頭定起要看星漢兔回機失却雪山牛與演侍者白鷗定怪盟事寒杖䔧投社不多難葦風華雪秋著岸舡月蓬霜夜轉灘丘壑身心徒役夢江湖臭味賦游般他時衣外傳來物喚得回頭倒剎竿顯禪人求頌顯處機須隱忙時智自間泥牛初出海玉馬復臨關寒水澄涵月流雲靜倚山回途分化抦不作舊家慳蒙禪人丐麥求頌杖頭挂鉢丐丹丘力破清貧一點憂紅雨幾番華事老黃雲萬頃麥家秋對緣手眼通身是應物機輪轉處幽歸理韶陽餬餅話肚皮束篾飽齁齁送緣上人持鉢緣丐人間一錫飛蒼巖煙膩雪初晞風絲未許鬧禪眼雲錦將看落化機自勉叢林供食鉢誰嫌塵土翳征衣歸來僧飽上方飯相伴春山歌采薇與法上人南谷過黃氏居淡煙蒼樹水濺濺黃氏初平已得仙滿地癡羊不收拾夕陽零亂繞籬眠亂石深雲尋野泉老儂怪我地行仙鍾情山水醇於酒今夜竹床成醉眠與輔禪人方游捋遍虎髭鬚空劫壺中探有無風月滿頭功未轉江山入骨病難扶針投芥粒機非爽絃續鸞膠道不枯歸去叢林看儀羽丹山出處九包鶵與嵩禪人烏石嶺頭相見長生路上常逢正是游山時節落華芳草蒙茸次韻端楞伽與生首座縛茨枯坐九江東鏡像虛融方寸中舜若多身禪夜看母陀羅臂用時通緣生誰兆有非有寂照自知空不空道契觀音斯善應蕭蕭竹雨雜松風假日山行平生胸中雲外峯有閒便與扶瘦笻但知一世丘壑味想得十分猿鳥從明見秋容山洗雨清可人意風吟松歸來游興散不盡誰杵喚月黃昏鐘別陸尚書千里同風德不孤心秋覺月照空壺兩頭坐斷何生死一點圓明異有無木馬寒嘶青草塢泥牛春種白雲區見聞佛事誰迎背用處全機道轉樞超然居士得得問道於寶峯祥禪師且欲歸歌長篇以謝予偕其行見挽以和漬筆說句繼之門門通徹長安道信手拈來還恰好脚跟踏著趙州關丈六金身一莖草我初相會箇中人法法圓通見懷抱杖屨追隨來道場不學癡禪事關掃青山白雲一徑通行行鳥道誰尋討寶峯師是馬馰兒相得而今恨不早吸盡西江居士龐喚回竪指俱胝老泥牛力耕空劫春木人捧出形山寶罷捋虎鬚歸去來荊棘林中任起倒午日麗天光杲杲過王彥與郊居晨露晞時桑柘宿雲斂處溪山摩詰畫圖未卷淵明農事初閒與福州滿禪人而今別後記丁寧曹洞家風句未形月滿鳳林寒不夢年深龜殼灼猶靈沈沈莫觸蛇頭毒的的須明犀角星便與放開聊展手那時相見望州亭投食山家霜晨䔧杖起孤禪乞食山家圖省緣斜徑順風鳴竹火飛甍迷眼映松煙秋羹木鼈有真味午飯樹鷄無俗羶誰謂客床臥不穩我無支遁買山錢禮大陽明安塔道中得句佳處軫游念芒鞵笻杖俱溪寒臥虹餓路暗垂雲腴岡樹鳩呼雨田家鷄告晡此心亮誰語三繞石浮屠教禪人出丐求頌歷歷樞中轉化機出門氣象履芳時溪光麗濯紅錦段風柳細撚黃金絲空空不礙渾亡我處處相逢却是誰會得賓頭盧見佛向人賣弄有長眉妙禪人出丐求頌劫壺浩浩洗魔緣妙處真觀自見前的的未萌明實際靈靈無得入深禪風搏海運鯤將蛻月皎沙寒鷺不眠觸事投諧能轉變何妨大浪駕空船折桂章首座近自雙泉來因作句與之家林穩臥一巢雲厭作梁家庵底賓折桂手舒寒觸月㘅珠眼合夢游春庭除不見雨華鳥麋鹿能來呼谷神五老芳隣歸問訊笑談相對白頭新宣和甲辰歲開十日予欲束衣隨淮水東下錦官常禪人且合掌請語因留三絕麓華聯蕾破春紅慚愧無私造化功誰怕滿頭樁歲月要聽啼鳥說家風腸那著一星愁但覺春眠粥似稠夢外尋盟何處是荻州稚子綠排頭恬然誰作去留心月下滄波風過林相別相逢定何所明明向道只如今送同座主歸上黨月兔含清欲噴霜客懷陳習作歸翔誰云掃盡名言垢我笑熏成知見香聚石為徒頭易點悟空能講義難量到家握麈隨宜說莫對餘機揮界方覺海長鯨作蛻翔青天端以背磨光胸中浩浩吞雲夢眉際津津秀太行靜榻每來成友語孤笻他往咽人腸後將訪我先傳雁為薙別來三徑荒夜明簾外月天霜衲子還家機事忘枯木吟雲須內照死蛇含毒更隄防聞琴起舞飲光習放鏡迷頭演若狂好是重來斵蠅翼祖師鼻孔要生光大明庵留偈略彴橫門下轉流挂窓山在屋簷頭大明古意是時節霜夜月堂簾上鉤心知莊求頌耕雲種月自由人田地分明契券真黃獨將看炊作飯白牛今已牧來純钁頭活計時時用物外家風處處親禾黍十分秋可望飽叢林漢著精神與禪人白蘋風作江頭秋青鳥夢隨沙水流清興十分蓬上月滿船載入蘆華洲斯適意去來休六鼇合負歸來也煙浪雪翻收釣鉤純白禪人求頌明月蘆華未得如清光自照本來虛十方坐斷須拈帽一色功圓要放鋤轉背石人歸位後擡頭玉馬過關初塵塵剎剎見身相方信曹山井覷驢泐潭雲庵偶作曦色雲庵半堵紅霜林初暖鳥啼風不知人在蘿窓裏瞑目爐薰百慮空次韻超然與折桂覺大師兼簡方丈老束肚三條篾恬然臥家林機深大仰寂用捷長沙岑空壑溪鳴玉疎筠月漏金東山師叔在此道未浮沈借雪竇韻送超然居士趙表之時在泐潭一口吸盡西江水馬師家風擢然起老龐俯伏嗣芳塵古也今也誰如此超然道與若人交南游浩意未相饒風清骨秀眼寒碧玉井氷壺凍不消羌床孤臥淨名室無住無依脫虛溢淵然一默乃全提不二門開肖當日佛事圓來作歸想出門岐路平如掌到家兒女獨圝頭相對無言得真賞南麓新居山麓水濱竹木陰我儂懶養靜居深一生自足淡中味三際那收閒底心壑雲未成出岫意松風能作下灘音十分清興與誰共想有沃洲支遁林送嵩上人住庵世間塵雜長人癭歸臥蘿龕霜月影裏許離微妙轉功玉壺夜汲瑠璃井吾家語味嚼枯硬醉飽回來雙眼冷雲水明明得自由六門事外誰關屏禪腹須來竹篾纏好看水牯自耕田布單不賣三千里樹耳誰疑二十年一句合頭尊旅會十方坐斷正偏圓他時投杖來相訪且莫窮忙空竪拳燒痕笋蕨富登春誰解看承庵內人天供異華功未盡龍吟枯木病難泯夜禪終作寒蟬蛻晝臥何妨倦鳥伸後日重來勘諸祖阿誰鉤上赤梢鱗榮上人發心知羅漢堂辨茶油事乞頌這開夢覺底因緣佛佛心同亡後先一點靈明三世外十分妙淨萬機前琢磨自得叢林下游戲何妨百草顛塵剎縱橫俱化事起家人只奮空拳心上人乞食求頌去去之人乞食心春風浩蕩洗叢林松蹊香膩糝黃粉竹塢清癯包玉簪炊甑分珠齋鉢滿淨瓶汲月夜塘深歸來磨濯光明在向道塵泥不涴金訪楊才叔不遇留偈齋舍呼笻起寂下雲居寒麓回春尋友于煙染草芒三徑暗雪晞麥脚一鉏濡欲求真語滌塵想那畏峭風生粟膚不見詩郎歸悵怏清癯時對石菖蒲解首座職事書記相招以偈力辭原鴒能作歸呼音暮風墮葉秋在林路沙漠漠水潏潏夜色冉冉山陰陰坐冠多士自省短挽袂乃友相知深乞與高閒償夙歉閉門穩臥舒疲心偶成示眾楊柳斜風力弱芭蕉擊雨聲寒莫把見聞作對誰將聲色相瞞成侍者求頌真源不皺風月兔影澄水枯情但恬如默默飽禪味家風迺廓然當年第一義機輪轉有方萬化出彈指庚子冬二十八日天意晴和與止上人同南麓行橫岡轉流長作清響陰溪直木寒無悴容到竹林人家飲茶而還雲麓勝處夙未到清行興銳忘崎嶔誰無瘦杖少扶力我與幽人同賞心壑津軟綠自宛轉岸樹老碧長陰森溪西乞火煮茶去竹裏人家齋磬音別五祖山悅眾東山聚散亦夤緣華吐芳姿柳鎖煙肯處根塵非一一用時手眼恰千千塔中祖有相傳事嶺外人元不會禪後日能來圓此話未嫌敲枕喚春眠五祖將禪人求頌東風吹斷濡華雨淮上秀峯青可數束屨欲尋南北山卷衣又別東西祖淵魚蒲鳥鬧一家汀笋溪甘兩箸處處相逢記得麼夜寒月在珊瑚樹雲上人持鉢求頌雲林風雪暮纖纖滴瀝寒聲曉斷簷一點丐心盟杖屨十分化事入鎚鉗霽光如拭月無礙華錦落機春不嫌百億分身遍塵剎見聞蕭灑孰相粘清上人持鉢求頌苕霅溪頭柳眼青食時持鉢眾香城諸隣定怪顛毛白久客自憐心境清重念雪寒親塵語無忘水暖赴鷗盟飽叢林漢深相悉笋蕨春山次第生送廣禪人溫風促客下雲嶺觸處無心即道游得坐會當明變豹出門須解倒騎牛衝煙笻入青蘿徑載月船回白鳥洲中外夷猶功迹絕㳷然天水一成秋勤大師訪別作句贈之若子能來過我門端知良遂志彌敦微塵破處得經卷萬象紛時空眼根與世支離誰惡意怪人棱瘦自秋痕歸興定到家林穩山月流明洗夜昏送金上人之水南裏許由來懶荷擔百草頭上何廉纖半夜對月笑拍手不見噴霜三脚蟾劫空有句妙如許公去誰余對眉語後見太平堂上師敢煩為我分明舉送覺禪人明月堂虛客不留衡湘秀處賦清游回途復妙無遺影天水從來一樣秋送願上人歸鄉溪頭買船歸鄂渚一櫂清風夜蟾午行盡韶山半月程白雲兒就青山父巖頭老子末後句此到將知問不語無縫塔前風色高洞然不隔絲毫許丁寧此去快須回吾家之子要全才不坐兩頭明暗路偏中歸去正中來阿呵呵胸次風流知幾何自廬山折桂旛竿原下望彭䗍湖握杖過前山僧舍說偈木落山骨瘦水退沙痕隆漁舟弄江日一葉浮軟紅眼底事不俗道人心若沖旛竿頭進步雲水展家風出康廬渡江淮山拜諸祖塔道中作澁舟沙水岸棱棱岸上春泥深涴藤回首康山懷結社真情祖室事傳燈子孫亹亹雪庭可衣鉢繩繩舂屋能坐照少林牆面意湛明心地瑩如氷與傳道者殘毳編衣裹槁形胸中底事獨醒醒亡機沖應用時妙活眼冷窺虛處靈語秀錦雲春片段氣清梅雪曉零星而今功盡牛頭懶華鳥不來風掃庭題至游庵兼簡庵中道友真實人居遍十方至游處處露堂堂鵝於水器擇其乳蜂在華房採得香心鑑照中無垢翳道環虛裏見神光能來鬧市住三昧鳥度長空迹不彰次韻傳道者且游落星院風立沙根膚粟頑冷涵星石水灣灣登舟欲濟軒窓底扶檻政疑圖畫間雲拭山容蒼玉障日浮江面紫金環回頭五老相招我林友無嫌夜扣關懷上人出丐求頌胡床擁毳怯春寒懷丐人行野雪乾風信入華披錦段月魂墮水濯金盤淨名取飯亡多力慈氏開門只一彈妙得其中佛受用頭頭成見不相瞞一知殿化佛殿僧堂中燈油求頌佛燈誰我續光明果若蓮開大夢醒香草有心持潔白蘭膏無脚湛寒青默耕化外那知夜真照壺中不覺冥家世兒孫傳底事從教輝耀顯門庭亮禪人持鉢求頌家林一錫飛炊處青煙微嚴默起禪板虛通轉化機溪寒秋染色月冷夜流輝莫學西山亮此行宜早歸初禪人持鉢求頌佛事潛通興化門用時斤斧莫成痕全機超出輪回際一句拔除生死根涼吹洗磨煩袂暑素蟾排逐夜臺昏鵝王引飲唯醇味水乳斯分不我渾過般若庵重軒瘦立曲欄頭島嶼青微冷枕流望眼解隨沙水轉賞心真與岸雲浮平分野色連延屋點破江光相趁舟般若空宗深得義森羅元不礙人休登雲庵廜㢝對碧溪霜草露幽蹊顧我丘壑醉知誰塵土迷蘿門窺窈窕雲磴履高低猿鳥未相棄伴人煙樹捿送傳道者歸省母氏夜來霜嚇橘臍黃乞與歸人懷冷香到日跨門須轉却白頭不是本生娘妙盡功圓轉處幽若人真解倒騎牛雨蓑風笠舊行李適意明明百草頭圓禪者求頌枯歇身心百不思湛圓自照劫空時妙明智鑑那留垢虛廓靈機未度絲的的髑髏看活眼堂堂塵剎用間眉是須恁麼承當去鼻孔纍垂識祖師斜川道上望廬山三絕真味酣心倚瘦笻蕭騷風嘯一蹊松無人共語圓通境笑看雲吞石耳峯青山放足溪轉腰蓑翁理網兒搖𬜑先生疇日騎魚去岸上人家誰姓陶水從烏石山前轉人在斜川岸上行寂漠柴桑古祠下我來無酒酹淵明妙湛大師求頌妙則不粗湛則不渾妙湛而照瑩然亡痕雲山是主水月無根瘦坐一默虛融六門竅作風籟華含春恩相承箇事子子孫孫次韶谷書記勝果院絕句沙風漠漠卷煙湖默默漁舟似有無五老回看更癡絕渠應怪我得工夫小師慧果丐鹽求頌可中滋味欠些些成就廬山笋蕨家丐事子行黃葦渡盟心人在白鷗沙和羹戶戶俱煎鹵掃雪村村欲沒靴味及衲僧初偃月圓通只箇是生涯暉禪人丐鹽求頌廬山淡薄已多時誰與叢林洗敗姿為愛海氷資菜味不嫌春雨破華枝仙陀婆事行行辨舜
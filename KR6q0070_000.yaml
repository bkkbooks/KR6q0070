body:
  text: 天童覺和尚語録序余頑愚拙疏無所可用獨於世味淡薄人我相輕若可學佛者以故自幼喜從僧遊間遇本色道人雖未言而意已親殆若磁石鐵之冥契有不可致詰者否則雖日相從邈如也今天童長老覺公則所謂未言而意已親者始余被罪南遷泊舟廬山之下與師一再邂逅耳而相與之意便如故人去歲罷相東來師過余於四明余復訪之於山中語纍日益歡嘗謂師曰學佛者期於了生死誠可謂一大事矣士大夫間乃有酣飫聲色馳騁勢利而口舌瀾翻説佛説祖自以為有得甚者至以為談笑之資此何理也余之有意於此事而不敢自欺他時真實處辦得少許方敢拈出求師別識也師深肯此言且教余以辦道之方余信受焉會師之徒以師語録序為請余既不敢自欺其敢措辭乎姑記與師相從大略以塞其請云紹興壬子望日退晦居士范宗尹序
